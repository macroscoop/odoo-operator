---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
  name: odoostagingrefreshjobs.bemade.org
spec:
  group: bemade.org
  names:
    categories: []
    kind: OdooStagingRefreshJob
    plural: odoostagingrefreshjobs
    shortNames:
    - staging-refresh
    singular: odoostagingrefreshjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.odooInstanceRef.name
      name: Target
      type: string
    - jsonPath: .spec.source.instanceName
      name: Source
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OdooStagingRefreshJobSpec via `CustomResource`
        properties:
          spec:
            description: 'OdooStagingRefreshJob populates or refreshes a staging OdooInstance from a live source instance.  DB is streamed via `pg_dump | pg_restore`; filestore is rsync''d (Phase 1) or CSI-cloned from a VolumeSnapshot (Phase 2, opt-in via `filestoreMethod: snapshot`).  Neutralization and mail-server verification from the existing restore pipeline run after both transfers succeed.'
            properties:
              filestoreMethod:
                default: auto
                description: FilestoreMethod selects how the filestore is copied from source to target. The `Auto` variant picks `Snapshot` when a VolumeSnapshotClass covers the filestore's StorageClass, falling back to `Copy` otherwise.  `Copy` (F2) is implemented in Phase 1; `Snapshot` (F1) is Phase 2.
                enum:
                - auto
                - snapshot
                - copy
                type: string
              neutralize:
                default: true
                description: Whether to run `odoo neutralize` after the copy.  Defaults true. Should only be set to false for same-domain copies where the caller has some other guarantee no emails can escape.  Even when false, the mail-server verification still runs — a surviving active mail server with a real smtp_host always fails the job.
                type: boolean
              odooInstanceRef:
                description: OdooInstanceRef is a reference to an OdooInstance resource.
                properties:
                  name:
                    type: string
                  namespace:
                    nullable: true
                    type: string
                required:
                - name
                type: object
              skipFilestore:
                default: false
                description: 'DB-only refresh: skip filestore copy entirely.  Rare, but useful when the filestore is so large that rsyncing it blocks the whole refresh cycle and the user only needs the DB for the current test.'
                type: boolean
              source:
                description: StagingSource points at the live OdooInstance whose DB and filestore will be cloned.  `instanceNamespace` defaults to the target's namespace when omitted.  v1 requires source and target to be in the same Kubernetes cluster — cross-cluster is a future addition.
                properties:
                  instanceName:
                    type: string
                  instanceNamespace:
                    nullable: true
                    type: string
                required:
                - instanceName
                type: object
              webhook:
                description: WebhookConfig defines an optional webhook callback for job completion notifications.
                nullable: true
                properties:
                  secretTokenSecretRef:
                    description: SecretKeySelector selects a key from a Secret.
                    nullable: true
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  token:
                    nullable: true
                    type: string
                  url:
                    type: string
                required:
                - url
                type: object
            required:
            - odooInstanceRef
            - source
            type: object
          status:
            description: 'OdooStagingRefreshJobStatus captures the multi-Job orchestration state. Three underlying batch/v1 Jobs back a single refresh: one for DB clone, one for filestore copy (unless skipped), and one for neutralize.  Their names are tracked here for troubleshooting.  `rollbackSnapshot` is set only when Phase 2 (CSI snapshot) is in use.'
            nullable: true
            properties:
              completionTime:
                nullable: true
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dbJobName:
                description: batch/v1 Job name for the DB clone.
                nullable: true
                type: string
              dbJobPhase:
                description: Recorded terminal phase (`Completed`/`Failed`) of the DB clone Job. Persisted on first observation so that future reconciles remain correct after the underlying batch/v1 Job is garbage-collected by `ttlSecondsAfterFinished` while sibling sub-Jobs are still running.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                nullable: true
                type: string
              filestoreJobName:
                description: batch/v1 Job name for the filestore copy/clone.
                nullable: true
                type: string
              filestoreJobPhase:
                description: Recorded terminal phase of the filestore clone Job.  See `dbJobPhase`.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                nullable: true
                type: string
              filestorePhase:
                description: Mode-agnostic phase for the filestore step.  Set to `Running` once either the rsync Job has been created or the snapshot/clone PVC recreate has been kicked off; transitions to `Completed`/`Failed` when the underlying Job terminates (Copy path) or the new PVC binds (Snapshot path).  Used as the start guard and completion gate for the filestore step regardless of `filestoreMethod`.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                nullable: true
                type: string
              message:
                nullable: true
                type: string
              neutralizeJobImageHash:
                description: SHA-256 hex prefix of the OdooInstance image that the neutralize Job was created with.  When the neutralize step has terminally failed and the user corrects the image, the operator detects the hash mismatch, deletes the failed Job, clears the neutralize_* status fields, and recreates the Job with the corrected image.
                nullable: true
                type: string
              neutralizeJobName:
                description: batch/v1 Job name for the neutralize step.
                nullable: true
                type: string
              neutralizeJobPhase:
                description: Recorded terminal phase of the neutralize Job.  See `dbJobPhase`.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                nullable: true
                type: string
              phase:
                description: Phase represents the lifecycle state of a job resource.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                nullable: true
                type: string
              rollbackSnapshot:
                description: VolumeSnapshot of the target's pre-refresh filestore, retained for 24h so a bad refresh can be rolled back.  Phase 2 only.
                nullable: true
                type: string
              sourceSnapshot:
                description: VolumeSnapshot taken from the source filestore PVC for this refresh.  Phase 2 only; `None` for rsync-based refreshes.
                nullable: true
                type: string
              startTime:
                nullable: true
                type: string
              tempDbName:
                description: 'Temporary DB name used for blue/green cutover.  Pattern: `<live_db>_refresh_<rfc3339_short>`.  Set before the DB Job starts and cleared after the rename cutover succeeds.'
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: OdooStagingRefreshJob
        type: object
    served: true
    storage: true
    subresources:
      status: {}
