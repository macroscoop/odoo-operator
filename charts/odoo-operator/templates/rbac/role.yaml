apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: odoo-operator
  namespace: {{ .Release.Namespace }}

rules:
  # Full lifecycle management of all Odoo custom resources
  - apiGroups: ["bemade.org"]
    resources:
      - odooinstances
      - odoobackupjobs
      - odoorestorejobs
      - odoostagingrefreshjobs
      - odooupgradejobs
      - odooinitjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Status subresource updates
  - apiGroups: ["bemade.org"]
    resources:
      - odooinstances/status
      - odoobackupjobs/status
      - odoorestorejobs/status
      - odoostagingrefreshjobs/status
      - odooupgradejobs/status
      - odooinitjobs/status
    verbs: ["get", "update", "patch"]

  # Finalizer updates
  - apiGroups: ["bemade.org"]
    resources:
      - odooinstances/finalizers
      - odoobackupjobs/finalizers
      - odoorestorejobs/finalizers
      - odoostagingrefreshjobs/finalizers
      - odooupgradejobs/finalizers
      - odooinitjobs/finalizers
    verbs: ["update"]

  # Core resources managed as children of OdooInstance
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Pods — needed to detect and recover from stuck volume mounts.  The operator
  # deletes pods with persistent FailedMount/FailedAttachVolume events so the
  # deployment controller recreates them (often clearing stale CSI state).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]

  # VolumeAttachments — escalation path for repeatedly-stuck mounts: detach
  # the PV from a node when deleting the pod alone doesn't unstick it.
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "delete"]

  # VolumeSnapshots — staging refresh's snapshot path creates a snapshot
  # of the source filestore PVC and uses it as the dest PVC's
  # dataSourceRef.  Required for both CephFS and JuiceFS backends; the
  # latter only accepts VolumeSnapshot dataSources, so this is the
  # universal path.
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # PersistentVolumes (for filestore StorageClass migration rebind)
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "patch"]

  # Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Jobs (created by and owned by job CRs)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Deployments scale subresource (for kubectl scale)
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]

  # Ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Gateway API HTTPRoutes
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events (core + events.k8s.io for kube-rs Recorder, plus read access
  # for FailedMount/FailedAttachVolume detection).
  - apiGroups: ["", "events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]

  # Webhook configuration cleanup (migration from Kopf operator)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "delete"]

  # CRD status patch (to clear status.storedVersions during v1→v1alpha1 migration)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions/status"]
    verbs: ["get", "patch"]
